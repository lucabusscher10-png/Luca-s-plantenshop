<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca's Plantenshop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f1ea; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        h1 { text-align: center; color: #2e4d32; margin-bottom: 30px; }
        .product-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); text-align: center; }
        .product-img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .voorraad { font-weight: bold; color: #1a73e8; }
        button { background-color: #4CAF50; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:disabled { background-color: #d3ccbc; color: #777; cursor: not-allowed; }
        .cart { background: #fff; padding: 20px; border-radius: 20px; margin-top: 30px; border: 2px solid #2e4d32; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .total { font-weight: bold; font-size: 1.4em; margin-top: 15px; text-align: right; color: #2e4d32; }
        .mail-btn { background-color: #1a73e8; margin-top: 20px; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 Luca's Plantenshop</h1>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1470004914212-05527e49370b?auto=format&fit=crop&w=800&q=80&v=2" class="product-img" alt="Zonnebloem">
        <h3>Zonnebloem pitten</h3>
        <p>Prijs: <b>€1,50</b></p>
        <p>Voorraad: <span id="v-zonnebloem" class="voorraad">...</span></p>
        <button id="btn-zonnebloem" onclick="addToCart('Zonnebloem pitten', 1.50)" disabled>In winkelwagen</button>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1570584852122-23cdeadb4aa1?auto=format&fit=crop&w=800&q=80&v=2" class="product-img" alt="Pompoen">
        <h3>Pompoen Pitten</h3>
        <p>Prijs: <b>€2,00</b></p>
        <p>Voorraad: <span id="v-pompoen" class="voorraad">...</span></p>
        <button id="btn-pompoen" onclick="addToCart('Pompoen Pitten', 2.00)" disabled>In winkelwagen</button>
    </div>

    <div id="winkelwagen-sectie" class="cart" style="display:none;">
        <h3>🛒 Jouw Winkelwagen</h3>
        <div id="cart-items"></div>
        <div class="total">Totaal: €<span id="total-price">0.00</span></div>
        <button class="mail-btn" onclick="sendEmail()">Bestelling Mailen 📧</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://lucaplanten-e7054-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cart = [];

    function checkVoorraad(dbNaam, spanId, knopId) {
        db.ref('voorraad/' + dbNaam).on('value', (s) => {
            const a = s.val() || 0;
            document.getElementById(spanId).innerText = a;
            const btn = document.getElementById(knopId);
            if (a <= 0) { btn.disabled = true; btn.innerText = "OP"; } 
            else { btn.disabled = false; btn.innerText = "In Winkelwagen"; }
        });
    }

    checkVoorraad('Zonnebloem pitten', 'v-zonnebloem', 'btn-zonnebloem');
    checkVoorraad('Pompoen Pitten', 'v-pompoen', 'btn-pompoen');

    function addToCart(naam, prijs) {
        cart.push({naam, prijs});
        updateCartUI();
    }

    function updateCartUI() {
        const cartDiv = document.getElementById('cart-items');
        const totalSpan = document.getElementById('total-price');
        const sectie = document.getElementById('winkelwagen-sectie');
        sectie.style.display = 'block';
        cartDiv.innerHTML = '';
        let totaal = 0;
        cart.forEach((item) => {
            cartDiv.innerHTML += `<div class="cart-item"><span>${item.naam}</span><span>€${item.prijs.toFixed(2)}</span></div>`;
            totaal += item.prijs;
        });
        totalSpan.innerText = totaal.toFixed(2);
    }

    function sendEmail() {
        const emailAdres = "L.busscher10@gmail.com"; 
        let onderwerp = "Nieuwe bestelling bij Luca's Plantenshop";
        let inhoud = "Hallo Luca,%0A%0AIk wil graag het volgende bestellen:%0A%0A";
        cart.forEach(item => { inhoud += "- " + item.naam + " (€" + item.prijs.toFixed(2) + ")%0A"; });
        inhoud += "%0ATotaalbedrag: €" + document.getElementById('total-price').innerText;
        window.location.href = "mailto:" + emailAdres + "?subject=" + onderwerp + "&body=" + inhoud;
    }
</script>
</body>
</html>
